<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SIGES - Serviços Financeiros</title>
<meta name="description" content="Sistema de gestão de empréstimos da Siges Serviços Financeiros">
<meta name="theme-color" content="#0B416B">
<script>
  // Roda antes do CSS pintar a tela — evita um flash claro→escuro no load
  // pra quem já escolheu modo escuro antes. Só o atributo no <html>; a troca
  // de variável em si é toda em CSS, escopada em #app (style.css).
  //
  // Primeiro acesso é SEMPRE claro, mesmo com o sistema operacional em modo
  // escuro (decisão explícita do usuário, 2026-07-12) — não olha
  // prefers-color-scheme de propósito. Só muda depois que a pessoa escolhe
  // no toggle (aí sim persiste via localStorage, pros 3 papéis).
  (function () {
    try {
      var saved = localStorage.getItem('siges-theme');
      document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
    } catch (e) { /* localStorage indisponível (ex: modo privado) — segue claro */ }
  })();
</script>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Tela de autenticação (login/cadastro) -->
<div id="auth-screen" class="active"></div>

<!-- App principal (só aparece depois de autenticado) -->

    </aside>

        <section id="screen-gerente-gerentes" class="screen"></section>
        <section id="screen-gerente-solicitacoes" class="screen"></section>
        <section id="screen-gerente-contrato-novo" class="screen"></section>
        <section id="screen-gerente-contratos" class="screen"></section>
        <section id="screen-gerente-cobrar" class="screen"></section>

        <section id="screen-gerente-score" class="screen"></section>

        <section id="screen-gerente-auditoria" class="screen"></section>

    </div>
  </div>

  <nav id="tabbar-mobile" class="tabbar-mobile"></nav>
  <div id="mobile-more-backdrop" class="mobile-more-backdrop hidden"></div>

<script>
  document.getElementById('sidebar-logo-svg').innerHTML = Icons.logo;
  document.getElementById('topbar-signout').innerHTML = Icons.logout;
  document.getElementById('sidebar-signout-icon').innerHTML = Icons.logout;
  document.getElementById('sidebar-signout').onclick = handleSignOut;
  document.getElementById('topbar-theme-toggle').innerHTML = currentTheme() === 'dark' ? Icons.sun : Icons.moon;
  document.getElementById('topbar-theme-toggle').onclick = toggleTheme;
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
